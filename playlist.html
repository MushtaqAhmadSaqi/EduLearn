<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Playlists — EduLearn</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="css/custom.css" />
</head>

<body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <a href="#mainContent" class="skip-link">Skip to content</a>

  <nav class="glass fixed inset-x-0 top-0 z-50 border-b border-slate-200/70 dark:border-slate-800/70">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-4 px-4 sm:px-6">
      <a href="index.html" class="flex items-center gap-2 font-display text-lg font-extrabold">
        <span class="grid h-9 w-9 place-items-center rounded-2xl bg-gradient-to-br from-indigo-500 to-pink-500 text-sm font-black text-white shadow-soft">
          E
        </span>
        <span class="gradient-text">EduLearn</span>
      </a>

      <div class="hidden items-center gap-1 md:flex">
        <a href="index.html" class="nav-link">Home</a>
        <a href="playlist.html" class="nav-link active">Playlists</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
      </div>

      <div class="flex items-center gap-2">
        <button data-theme-toggle class="icon-button" aria-label="Toggle dark mode">
          <svg class="h-5 w-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 0 1 8.646 3.646 9.003 9.003 0 0 0 12 21a9.003 9.003 0 0 0 8.354-5.646z" />
          </svg>
          <svg class="hidden h-5 w-5 dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.36-.7.7M6.34 17.66l-.7.7m12.72 0-.7-.7M6.34 6.34l-.7-.7M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z" />
          </svg>
        </button>

        <div id="userMenu"></div>

        <button id="mobileMenuBtn" class="icon-button md:hidden" aria-label="Open menu">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        </button>
      </div>
    </div>

    <div id="mobileMenu" class="hidden border-t border-slate-200 bg-white/95 px-4 py-4 backdrop-blur dark:border-slate-800 dark:bg-slate-950/95 md:hidden">
      <div class="space-y-2">
        <a href="index.html" class="mobile-nav-link">Home</a>
        <a href="playlist.html" class="mobile-nav-link active">Playlists</a>
        <a href="dashboard.html" class="mobile-nav-link">Dashboard</a>
      </div>
    </div>
  </nav>

  <main id="mainContent" class="pt-16">
    <section class="border-b border-slate-200/70 bg-white/40 py-10 dark:border-slate-800/70 dark:bg-slate-900/20">
      <div class="mx-auto flex max-w-7xl flex-col gap-5 px-4 sm:px-6 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-sm font-bold uppercase tracking-wide text-indigo-600 dark:text-indigo-300">Study paths</p>
          <h1 class="mt-1 font-display text-4xl font-black text-slate-950 dark:text-white">Playlists</h1>
          <p class="mt-2 max-w-2xl text-slate-600 dark:text-slate-400">
            Organize your learning videos into courses, revision lists, and focused study sessions.
          </p>
        </div>

        <button id="newPlaylistBtn" class="btn-primary">
          ＋ New playlist
        </button>
      </div>
    </section>

    <section class="mx-auto grid max-w-7xl gap-6 px-4 py-8 sm:px-6 lg:grid-cols-[320px_minmax(0,1fr)]">
      <aside class="h-fit rounded-3xl border border-slate-200 bg-white p-4 shadow-soft dark:border-slate-800 dark:bg-slate-900 lg:sticky lg:top-24">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="font-display text-lg font-black text-slate-950 dark:text-white">Your playlists</h2>
        </div>

        <div id="playlistList" class="space-y-2">
          <div class="skeleton h-16 rounded-2xl"></div>
          <div class="skeleton h-16 rounded-2xl"></div>
          <div class="skeleton h-16 rounded-2xl"></div>
        </div>
      </aside>

      <div id="playlistContent" class="min-w-0">
        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="skeleton h-8 w-1/2"></div>
          <div class="mt-3 skeleton h-4 w-3/4"></div>
          <div class="mt-8 skeleton h-32 rounded-3xl"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/pages/playlist.js"></script>
</body>
</html>
