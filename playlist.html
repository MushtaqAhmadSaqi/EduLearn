<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlists | EduLearn</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-theme="light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top glass">
        <div class="container">
            <a class="navbar-brand gradient-text" href="index.html">
                <i class="fas fa-graduation-cap"></i> <span class="font-display fw-bold">EduLearn</span>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="playlist.html">Playlists</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item ms-lg-2">
                        <button id="themeToggle" class="btn btn-icon btn-sm"><i class="fas fa-moon"></i></button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="playlist-page pt-5 mt-4">
        <div class="container">
            <div class="row g-4">
                <!-- Sidebar -->
                <aside class="col-lg-3">
                    <div class="playlist-sidebar glass p-4 sticky-top" style="top: 100px;">
                        <div class="sidebar-header d-flex justify-content-between align-items-center mb-4">
                            <h3 class="font-display fs-lg m-0">Library</h3>
                            <button id="newPlaylistBtn" class="btn-primary btn-sm rounded-circle p-2" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div id="playlistList" class="playlist-list">
                            <!-- Playlists injected here -->
                        </div>
                    </div>
                </aside>

                <!-- Main Content -->
                <main class="col-lg-9">
                    <div id="playlistContent" class="glass p-4 p-lg-5 min-vh-75">
                        <div class="empty-state text-center py-5">
                            <i class="fas fa-layer-group fs-1 mb-3 opacity-10"></i>
                            <h3 class="font-display">Select a collection</h3>
                            <p class="text-muted">Choose a playlist from the left or create a new curated set.</p>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- New Playlist Modal -->
    <div class="modal fade" id="newPlaylistModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass border-0 shadow-floating">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-display">New Collection</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fs-xs fw-bold text-uppercase">Collection Name</label>
                        <input type="text" id="playlistNameInput" class="form-control" placeholder="e.g. Advanced Calculus">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fs-xs fw-bold text-uppercase">Description</label>
                        <textarea id="playlistDescInput" class="form-control" placeholder="What's this collection about?" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-link text-muted text-decoration-none" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="createPlaylistConfirm" class="btn-primary px-4">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/pages/playlist.js"></script>
</body>
</html>
