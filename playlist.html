<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Playlists — EduLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { display: ['Plus Jakarta Sans', 'sans-serif'] }}}}
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">

  <!-- ===== NAV ===== -->
  <nav class="glass fixed top-0 inset-x-0 z-40 border-b border-slate-200/50 dark:border-slate-800/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 font-display font-bold text-lg">
        <span class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center text-white text-sm">E</span>
        <span class="gradient-text">EduLearn</span>
      </a>

      <div class="hidden md:flex items-center gap-1">
        <a href="index.html" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition">Home</a>
        <a href="playlist.html" class="px-4 py-2 rounded-lg text-sm font-medium text-indigo-600 dark:text-indigo-400">Playlists</a>
        <a href="dashboard.html" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition">Dashboard</a>
      </div>

      <div class="flex items-center gap-2">
        <button data-theme-toggle class="w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center justify-center" aria-label="Toggle theme">
          <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <div id="profileSlot"></div>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN ===== -->
  <main class="pt-24 pb-12 px-4 sm:px-6">
    <div class="max-w-7xl mx-auto">

      <!-- Header -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div>
          <h1 class="font-display font-bold text-3xl sm:text-4xl mb-1">Playlists</h1>
          <p class="text-slate-500 dark:text-slate-400">Organize your learning into focused collections</p>
        </div>
        <button id="newPlaylistBtn" class="btn-primary inline-flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          New Playlist
        </button>
      </div>

      <!-- Layout: Sidebar + Content -->
      <div class="grid grid-cols-1 lg:grid-cols-[320px_1fr] gap-6">

        <!-- Sidebar -->
        <aside class="rounded-2xl bg-white dark:bg-slate-800/50 border border-slate-200/60 dark:border-slate-700/60 p-4 lg:sticky lg:top-24 lg:self-start lg:max-h-[calc(100vh-7rem)] overflow-y-auto">
          <h2 class="font-display font-bold text-sm uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-3 px-2">My Collections</h2>
          <div id="playlistList" class="space-y-1"></div>
        </aside>

        <!-- Content -->
        <section id="playlistContent" class="min-w-0"></section>

      </div>
    </div>
  </main>

  <script type="module" src="js/pages/playlist.js"></script>
</body>
</html>
