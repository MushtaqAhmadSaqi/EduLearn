<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlists - EduLearn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-theme="light">
    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-graduation-cap"></i> <span>EduLearn</span>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="playlist.html">Playlists</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><button id="themeToggle" class="btn btn-icon"><i class="fas fa-moon"></i></button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="playlist-page">
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <aside class="col-lg-3 playlist-sidebar">
                    <div class="sidebar-header">
                        <h3>My Playlists</h3>
                        <button id="newPlaylistBtn" class="btn btn-primary btn-sm">
                            <i class="fas fa-plus"></i> New
                        </button>
                    </div>
                    <div id="playlistList" class="playlist-list"></div>
                </aside>

                <!-- Main Content -->
                <main class="col-lg-9 playlist-main">
                    <div id="playlistContent">
                        <div class="empty-state">
                            <i class="fas fa-list"></i>
                            <h3>Select a playlist</h3>
                            <p>Choose a playlist from the sidebar or create a new one.</p>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- New Playlist Modal -->
    <div class="modal fade" id="newPlaylistModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Playlist</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="playlistNameInput" class="form-control mb-3" placeholder="Playlist name">
                    <textarea id="playlistDescInput" class="form-control" placeholder="Description (optional)" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="createPlaylistConfirm" class="btn btn-primary">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/playlist.js"></script>
</body>
</html>
