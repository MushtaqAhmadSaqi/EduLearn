<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch | EduLearn</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-theme="light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top glass" id="mainNav">
        <div class="container">
            <a class="navbar-brand gradient-text" href="index.html">
                <i class="fas fa-graduation-cap"></i> <span class="font-display fw-bold">EduLearn</span>
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button id="focusModeBtn" class="btn-primary btn-sm">
                    <i class="fas fa-eye"></i> Focus
                </button>
                <button id="pomodoroBtn" class="btn btn-outline btn-sm rounded-pill">
                    <i class="fas fa-clock"></i> <span id="pomodoroTime">25:00</span>
                </button>
                <button id="themeToggle" class="btn btn-icon btn-sm"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="video-page-wrapper pt-5 mt-4">
        <div class="container">
            <div class="row g-4">
                <!-- Main Video Area -->
                <div class="col-lg-8">
                    <div class="video-container glass overflow-hidden border-0 shadow-lg">
                        <div class="video-wrapper">
                            <div id="videoFrame"></div>
                        </div>
                        <div class="progress-track" style="height: 6px; border-radius: 0;">
                            <div id="videoProgress" class="progress-fill"></div>
                        </div>
                        <div class="video-info p-4">
                            <h1 id="videoTitle" class="video-title fs-xl font-display mb-3">Loading...</h1>
                            <div class="video-meta d-flex justify-content-between align-items-center mb-3">
                                <div id="videoTags" class="tags"></div>
                                <div class="video-actions d-flex gap-2">
                                    <button class="btn btn-icon glass" id="markComplete" title="Mark as Viewed">
                                        <i class="fas fa-check-circle"></i>
                                    </button>
                                    <button class="btn btn-icon glass" id="shareBtn" title="Share">
                                        <i class="fas fa-share-alt"></i>
                                    </button>
                                </div>
                            </div>
                            <p id="videoDescription" class="video-description text-muted fs-sm"></p>
                        </div>
                    </div>

                    <!-- Notes Section -->
                    <div class="notes-section glass mt-4 p-4">
                        <div class="notes-header d-flex justify-content-between align-items-center mb-4">
                            <h3 class="font-display m-0 fs-lg"><i class="fas fa-sticky-note me-2 text-primary"></i> Study Notes</h3>
                            <span class="fs-xs text-muted">Notes sync with video timestamps</span>
                        </div>
                        <div class="note-input-group glass p-2 mb-4 d-flex gap-2">
                            <input type="text" id="noteInput" class="form-control border-0 bg-transparent" placeholder="Capture a thought at this moment...">
                            <button id="saveNoteBtn" class="btn-primary">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div id="notesList" class="notes-list">
                            <!-- Notes will be injected here -->
                        </div>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="col-lg-4">
                    <div class="sidebar-card glass p-4 sticky-top" style="top: 100px;">
                        <h3 class="font-display fs-lg mb-4"><i class="fas fa-play-circle me-2 text-primary"></i> Coming Up</h3>
                        <div id="relatedVideos" class="related-videos">
                            <!-- Related videos will be injected here -->
                        </div>
                        <hr class="my-4 opacity-10">
                        <div class="study-stats">
                            <h4 class="fs-xs fw-bold text-uppercase text-muted mb-3">Your Progress</h4>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="fs-xs">Course Mastery</span>
                                <span class="fs-xs fw-bold">65%</span>
                            </div>
                            <div class="progress-track" style="height: 4px;">
                                <div class="progress-fill" style="width: 65%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="js/pages/video.js"></script>
</body>
</html>
