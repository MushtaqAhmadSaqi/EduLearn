<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Watching — EduLearn</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="css/custom.css" />
</head>

<body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <a href="#mainContent" class="skip-link">Skip to content</a>

  <nav class="glass fixed inset-x-0 top-0 z-50 border-b border-slate-200/70 dark:border-slate-800/70">
    <div class="mx-auto flex h-16 max-w-screen-2xl items-center justify-between gap-3 px-4 sm:px-6">
      <a href="index.html" class="flex items-center gap-2 font-display text-lg font-extrabold" aria-label="Back to library">
        <svg class="h-5 w-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19 3 12m0 0 7-7m-7 7h18" />
        </svg>
        <span class="hidden gradient-text sm:inline">EduLearn</span>
      </a>

      <div class="flex items-center gap-2">
        <button
          id="pomodoroBtn"
          class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm font-bold shadow-subtle transition hover:border-indigo-300 dark:border-slate-800 dark:bg-slate-900 dark:hover:border-indigo-800"
          aria-label="Start Pomodoro timer"
        >
          <svg class="h-4 w-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" />
          </svg>
          <span id="pomodoroTime" class="font-mono">25:00</span>
        </button>

        <button
          id="focusBtn"
          class="btn-primary px-3 py-2 text-sm"
          aria-label="Toggle focus mode"
          aria-pressed="false"
        >
          <span data-focus-label>Focus</span>
        </button>

        <button data-theme-toggle class="icon-button" aria-label="Toggle dark mode">
          <svg class="h-5 w-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 0 1 8.646 3.646 9.003 9.003 0 0 0 12 21a9.003 9.003 0 0 0 8.354-5.646z" />
          </svg>
          <svg class="hidden h-5 w-5 dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.36-.7.7M6.34 17.66l-.7.7m12.72 0-.7-.7M6.34 6.34l-.7-.7M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z" />
          </svg>
        </button>

        <div id="userMenu"></div>
      </div>
    </div>
  </nav>

  <main id="mainContent" class="pt-16">
    <div id="videoShell" class="mx-auto grid max-w-screen-2xl gap-6 px-4 py-6 sm:px-6 lg:grid-cols-[minmax(0,1fr)_420px]">
      <section class="min-w-0">
        <div class="overflow-hidden rounded-3xl border border-slate-200 bg-slate-950 shadow-floating dark:border-slate-800">
          <div class="aspect-video">
            <div id="player" class="h-full w-full"></div>
          </div>
        </div>

        <div class="mt-6 rounded-3xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900 sm:p-6">
          <div id="videoInfo" class="space-y-3">
            <div class="skeleton h-8 w-2/3"></div>
            <div class="skeleton h-4 w-full"></div>
            <div class="skeleton h-4 w-4/5"></div>
          </div>

          <div class="mt-6 flex flex-wrap gap-3">
            <button id="markCompleteBtn" class="btn-primary">Mark complete</button>
            <button id="addToPlaylistBtn" class="btn-secondary">Add to playlist</button>
            <button id="enableNotificationsBtn" class="btn-secondary">Enable timer alerts</button>
            <button id="deleteVideoBtn" class="btn-danger">Delete</button>
          </div>
        </div>

        <section class="mt-6">
          <div class="mb-4 flex items-center justify-between">
            <div>
              <p class="text-sm font-bold uppercase tracking-wide text-indigo-600 dark:text-indigo-300">Recommendations</p>
              <h2 class="font-display text-2xl font-black text-slate-950 dark:text-white">Related videos</h2>
            </div>
          </div>

          <div id="relatedVideos" class="grid gap-4 sm:grid-cols-2"></div>
        </section>
      </section>

      <aside class="min-w-0 space-y-6">
        <section class="rounded-3xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-4 flex items-start justify-between gap-3">
            <div>
              <p class="text-sm font-bold uppercase tracking-wide text-indigo-600 dark:text-indigo-300">Notes</p>
              <h2 class="font-display text-2xl font-black text-slate-950 dark:text-white">Timestamped notes</h2>
            </div>
            <span id="noteTimestamp" class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-bold text-indigo-600 dark:bg-indigo-950/50 dark:text-indigo-300">
              0:00
            </span>
          </div>

          <label class="block">
            <span class="sr-only">Write a note</span>
            <textarea
              id="noteInput"
              class="form-input min-h-[120px]"
              placeholder="Write a note for the current moment in the video..."
            ></textarea>
          </label>

          <div class="mt-3 flex items-center justify-between gap-3">
            <p class="text-xs text-slate-500 dark:text-slate-400">Shortcut: Ctrl/⌘ + Enter</p>
            <button id="saveNoteBtn" class="btn-primary">Save note</button>
          </div>
        </section>

        <section>
          <div id="notesList" class="space-y-3"></div>
        </section>
      </aside>
    </div>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="js/pages/video.js"></script>
</body>
</html>
