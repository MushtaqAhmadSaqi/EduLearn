<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watching — EduLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { display: ['Plus Jakarta Sans', 'sans-serif'] }}}}
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">

  <!-- ===== NAV ===== -->
  <nav class="glass fixed top-0 inset-x-0 z-40 border-b border-slate-200/50 dark:border-slate-800/50">
    <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-3">
      <a href="index.html" class="flex items-center gap-2 font-display font-bold text-lg shrink-0" aria-label="Back to home">
        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        <span class="hidden sm:inline gradient-text">EduLearn</span>
      </a>

      <div class="flex items-center gap-2">
        <!-- Pomodoro -->
        <button id="pomodoroBtn"
          class="group flex items-center gap-2 px-3 sm:px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-indigo-400 dark:hover:border-indigo-500 transition text-sm font-medium"
          aria-label="Pomodoro timer">
          <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span id="pomodoroTime" class="font-mono">25:00</span>
        </button>

        <!-- Focus Mode -->
        <button id="focusBtn"
          class="flex items-center gap-2 px-3 sm:px-4 py-2 rounded-xl bg-gradient-to-br from-indigo-500 to-pink-500 text-white text-sm font-medium shadow-soft hover:shadow-premium transition"
          aria-label="Toggle focus mode">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          <span class="hidden sm:inline">Focus</span>
        </button>

        <button data-theme-toggle class="w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center justify-center" aria-label="Toggle theme">
          <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN ===== -->
  <main class="pt-20 pb-12 px-4 sm:px-6">
    <div class="max-w-screen-2xl mx-auto grid grid-cols-1 lg:grid-cols-[1fr_380px] gap-6">

      <!-- LEFT: Video + Info + Notes -->
      <div class="min-w-0 space-y-6">

        <!-- Video Container -->
        <div class="rounded-2xl overflow-hidden bg-black shadow-premium">
          <div class="relative aspect-video">
            <div id="player" class="absolute inset-0"></div>
          </div>
          <!-- Custom progress bar (synced with player) -->
          <div class="progress-track rounded-none" role="progressbar" aria-label="Video progress">
            <div id="videoProgressFill" class="progress-fill"></div>
          </div>
        </div>

        <!-- Video Info -->
        <div id="videoInfo" class="space-y-3">
          <div class="skeleton h-8 w-3/4"></div>
          <div class="skeleton h-4 w-1/2"></div>
        </div>

        <!-- Notes Section -->
        <section class="rounded-2xl bg-white dark:bg-slate-800/50 border border-slate-200/60 dark:border-slate-700/60 p-5 sm:p-6 hide-in-focus"
                 aria-labelledby="notesHeading">
          <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h2 id="notesHeading" class="font-display font-bold text-lg flex items-center gap-2">
              <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
              Your Notes
            </h2>
            <span class="text-xs font-medium text-slate-500">
              Press <kbd class="px-2 py-0.5 rounded border border-slate-300 dark:border-slate-600 font-mono">N</kbd> to add note
            </span>
          </div>

          <!-- Note Editor -->
          <div class="flex gap-2 mb-4">
            <div class="shrink-0 px-3 py-2 rounded-xl bg-indigo-50 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 font-mono text-sm flex items-center" id="currentTimeDisplay">
              0:00
            </div>
            <input id="noteInput" type="text" placeholder="Write a note at current timestamp..."
              class="flex-1 px-4 py-2 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none transition">
            <button id="saveNoteBtn" class="btn-primary px-4 py-2 text-sm">Save</button>
          </div>

          <!-- Notes List -->
          <div id="notesList" class="space-y-2"></div>
        </section>

      </div>

      <!-- RIGHT: Sidebar (hidden in focus mode) -->
      <aside class="space-y-6 hide-in-focus">

        <!-- Actions card -->
        <div class="rounded-2xl bg-white dark:bg-slate-800/50 border border-slate-200/60 dark:border-slate-700/60 p-5">
          <h3 class="font-display font-bold text-sm uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-3">Actions</h3>
          <div class="grid grid-cols-2 gap-2">
            <button id="markCompleteBtn" class="flex flex-col items-center gap-1 px-3 py-3 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-950/30 transition text-sm">
              <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <span class="font-medium">Mark Viewed</span>
            </button>
            <button id="addToPlaylistBtn" class="flex flex-col items-center gap-1 px-3 py-3 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-950/30 transition text-sm">
              <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h10m-10 4h10"/></svg>
              <span class="font-medium">Playlist</span>
            </button>
            <button id="shareBtn" class="flex flex-col items-center gap-1 px-3 py-3 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-pink-400 hover:bg-pink-50 dark:hover:bg-pink-950/30 transition text-sm">
              <svg class="w-5 h-5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
              <span class="font-medium">Share</span>
            </button>
            <button id="downloadBtn" class="flex flex-col items-center gap-1 px-3 py-3 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-amber-400 hover:bg-amber-50 dark:hover:bg-amber-950/30 transition text-sm">
              <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              <span class="font-medium">Export</span>
            </button>
          </div>
        </div>

        <!-- Keyboard shortcuts -->
        <div class="rounded-2xl bg-gradient-to-br from-indigo-500/5 to-pink-500/5 border border-indigo-200/30 dark:border-indigo-800/30 p-5">
          <h3 class="font-display font-bold text-sm uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-3">Shortcuts</h3>
          <ul class="space-y-2 text-sm">
            <li class="flex justify-between"><span>Play / Pause</span> <kbd class="px-2 py-0.5 rounded border border-slate-300 dark:border-slate-600 font-mono text-xs">Space</kbd></li>
            <li class="flex justify-between"><span>Add note</span> <kbd class="px-2 py-0.5 rounded border border-slate-300 dark:border-slate-600 font-mono text-xs">N</kbd></li>
            <li class="flex justify-between"><span>Focus mode</span> <kbd class="px-2 py-0.5 rounded border border-slate-300 dark:border-slate-600 font-mono text-xs">F</kbd></li>
            <li class="flex justify-between"><span>Seek back</span> <kbd class="px-2 py-0.5 rounded border border-slate-300 dark:border-slate-600 font-mono text-xs">←</kbd></li>
            <li class="flex justify-between"><span>Seek forward</span> <kbd class="px-2 py-0.5 rounded border border-slate-300 dark:border-slate-600 font-mono text-xs">→</kbd></li>
          </ul>
        </div>
      </aside>

    </div>
  </main>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="js/pages/video.js"></script>
</body>
</html>
