<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="EduLearn — Distraction-free learning for students">
  <title>EduLearn — Focus. Learn. Grow.</title>

  <!-- Tailwind CDN (for dev); replace with compiled build for production -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif']
          },
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">

  <!-- ===== NAV ===== -->
  <nav class="glass fixed top-0 inset-x-0 z-50 border-b border-slate-200/50 dark:border-slate-800/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 font-display font-bold text-lg">
        <span class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center text-white text-sm">E</span>
        <span class="gradient-text">EduLearn</span>
      </a>

      <div class="hidden md:flex items-center gap-1">
        <a href="index.html" class="px-4 py-2 rounded-lg text-sm font-medium text-indigo-600 dark:text-indigo-400">Home</a>
        <a href="playlist.html" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition">Playlists</a>
        <a href="dashboard.html" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition">Dashboard</a>
      </div>

      <div class="flex items-center gap-2">
        <button data-theme-toggle aria-label="Toggle theme" class="w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center justify-center">
          <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <div id="profileSlot"></div>

        <!-- Mobile menu -->
        <button id="mobileMenuBtn" class="md:hidden w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center" aria-label="Menu">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu drawer -->
    <div id="mobileMenu" class="md:hidden hidden border-t border-slate-200/50 dark:border-slate-800/50 px-4 py-3 space-y-1">
      <a href="index.html" class="block px-4 py-2 rounded-lg bg-indigo-50 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 font-medium">Home</a>
      <a href="playlist.html" class="block px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">Playlists</a>
      <a href="dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">Dashboard</a>
    </div>
  </nav>

  <!-- ===== HERO ===== -->
  <section class="relative pt-32 pb-16 px-4 sm:px-6 overflow-hidden">
    <!-- Ambient gradient background -->
    <div class="absolute inset-0 -z-10">
      <div class="absolute top-20 left-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
      <div class="absolute top-40 right-1/4 w-96 h-96 bg-pink-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="max-w-5xl mx-auto text-center">
      <div data-anim="hero" class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full glass text-sm font-medium mb-6">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        Now with cloud sync
      </div>

      <h1 data-anim="hero" class="font-display font-extrabold leading-[1.05] mb-6" style="font-size: var(--fs-hero)">
        Focus. Learn. <span class="gradient-text">Grow.</span>
      </h1>

      <p data-anim="hero" class="text-lg sm:text-xl text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-10">
        The distraction-free learning platform that turns any YouTube video into a focused study session.
      </p>

      <div data-anim="hero" class="flex flex-col sm:flex-row gap-3 justify-center max-w-md sm:max-w-none mx-auto">
        <button id="addVideoBtn" class="btn-primary inline-flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Add Your First Video
        </button>
        <a href="dashboard.html" class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl border border-slate-300 dark:border-slate-700 font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition">
          View Dashboard
        </a>
      </div>
    </div>
  </section>

  <!-- ===== VIDEOS GRID ===== -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 pb-24">
    <div class="flex items-center justify-between mb-8 flex-wrap gap-4">
      <h2 class="font-display font-bold text-2xl sm:text-3xl">Your Library</h2>
      <div class="flex gap-1 p-1 rounded-xl bg-slate-100 dark:bg-slate-800 text-sm">
        <button data-filter="all" class="filter-btn px-4 py-1.5 rounded-lg font-medium bg-white dark:bg-slate-700 shadow-sm">All</button>
        <button data-filter="inprogress" class="filter-btn px-4 py-1.5 rounded-lg font-medium text-slate-500">In Progress</button>
        <button data-filter="completed" class="filter-btn px-4 py-1.5 rounded-lg font-medium text-slate-500">Completed</button>
      </div>
    </div>

    <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
  </section>

  <!-- ===== MAIN JS ===== -->
  <script type="module" src="js/pages/home.js"></script>
</body>
</html>
