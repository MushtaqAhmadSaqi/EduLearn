<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduLearn - Master Your Studies</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/custom.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#ec4899',
                    },
                    fontFamily: {
                        display: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }
        
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow-floating);
            animation: authEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes authEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
        }
        
        .auth-tabs {
            display: flex;
            background: rgba(148, 163, 184, 0.1);
            padding: 0.25rem;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
        }
        
        .auth-tab {
            flex: 1;
            padding: 0.6rem;
            text-align: center;
            cursor: pointer;
            border-radius: 0.6rem;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .auth-tab.active {
            background: white;
            box-shadow: var(--shadow-soft);
            color: var(--primary);
        }
        
        .dark .auth-tab.active {
            background: var(--surface);
            color: var(--primary);
        }
        
        .form-floating > .form-control:focus ~ label::after {
            background-color: transparent !important;
        }
    </style>
</head>
<body data-theme="light">
    <div class="container d-flex justify-content-center">
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="auth-logo gradient-text">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="fs-xl font-display">Welcome to EduLearn</h1>
                <p class="text-muted fs-sm">Distraction-free learning starts here.</p>
            </div>

            <div class="auth-tabs" id="authTabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="signup">Sign Up</div>
            </div>

            <form id="authForm">
                <div class="mb-3">
                    <label class="form-label fs-xs fw-bold text-uppercase">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fs-xs fw-bold text-uppercase">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary w-100 mb-3" id="submitBtn">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="index.html" class="text-muted fs-xs text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { Auth } from './js/modules/auth.js';
        
        const form = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const tabs = document.querySelectorAll('.auth-tab');
        let mode = 'login';

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                mode = tab.dataset.tab;
                submitBtn.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            let result;
            if (mode === 'login') {
                result = await Auth.signIn(email, password);
            } else {
                result = await Auth.signUp(email, password);
            }

            if (result) {
                window.location.href = 'index.html';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
            }
        });
    </script>
</body>
</html>
