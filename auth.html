<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — EduLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { display: ['Plus Jakarta Sans', 'sans-serif'] }}}}
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 antialiased">

  <!-- Ambient background -->
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute top-10 left-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-10 right-1/4 w-96 h-96 bg-pink-500/10 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-md">
    <!-- Logo -->
    <a href="index.html" class="flex items-center justify-center gap-2 mb-8 font-display font-bold text-xl">
      <span class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center text-white">E</span>
      <span class="gradient-text">EduLearn</span>
    </a>

    <div class="glass rounded-3xl p-8 shadow-floating" style="box-shadow: var(--shadow-floating);">
      <!-- Tabs -->
      <div class="flex gap-1 p-1 rounded-xl bg-slate-100 dark:bg-slate-800 mb-6">
        <button data-tab="signin" class="tab-btn flex-1 py-2 rounded-lg font-medium bg-white dark:bg-slate-700 shadow-sm text-sm">Sign In</button>
        <button data-tab="signup" class="tab-btn flex-1 py-2 rounded-lg font-medium text-slate-500 text-sm">Create Account</button>
      </div>

      <!-- Sign In Form -->
      <form id="signinForm" class="space-y-4">
        <h1 class="font-display font-bold text-2xl mb-1">Welcome back</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Continue your learning journey</p>

        <div>
          <label class="block text-sm font-medium mb-1.5">Email</label>
          <input name="email" type="email" required autocomplete="email"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1.5">Password</label>
          <input name="password" type="password" required minlength="6" autocomplete="current-password"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none transition">
        </div>

        <button type="submit" class="btn-primary w-full py-3">Sign In</button>
      </form>

      <!-- Sign Up Form -->
      <form id="signupForm" class="space-y-4 hidden">
        <h1 class="font-display font-bold text-2xl mb-1">Create an account</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Start learning distraction-free</p>

        <div>
          <label class="block text-sm font-medium mb-1.5">Email</label>
          <input name="email" type="email" required autocomplete="email"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1.5">Password</label>
          <input name="password" type="password" required minlength="6" autocomplete="new-password"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none transition">
          <p class="text-xs text-slate-500 mt-1">At least 6 characters</p>
        </div>

        <button type="submit" class="btn-primary w-full py-3">Create Account</button>
      </form>

      <p class="text-xs text-center text-slate-500 dark:text-slate-400 mt-6">
        By continuing, you agree to EduLearn's Terms & Privacy Policy.
      </p>
    </div>

    <p class="text-center text-sm text-slate-500 mt-6">
      <a href="index.html" class="hover:text-indigo-500 transition">← Back to home</a>
    </p>
  </div>

  <script type="module" src="js/modules/auth.js"></script>
</body>
</html>
